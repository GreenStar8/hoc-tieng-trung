<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tự Học Tiếng Trung PWA</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f5f5dc">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5dc; /* Màu Beige */
      color: #2e4a3f; /* Màu Sage Green đậm */
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      margin: 50px auto;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .flashcard {
      font-size: 70px;
      margin: 20px 0;
      color: #c0392b;
    }
    .pinyin {
      font-size: 24px;
      color: #7f8c8d;
      margin-bottom: 10px;
    }
    .meaning {
      font-size: 20px;
      font-weight: bold;
    }
    .info {
      margin-top: 30px;
      font-size: 13px;
      color: #95a5a6;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Học Tiếng Trung Mỗi Ngày</h2>
    <hr style="border: 0; border-top: 1px solid #eee;">
    
    <div class="flashcard">中</div>
    <div class="pinyin">zhōng</div>
    <div class="meaning">Nghĩa: Ở giữa, Trung tâm, Trung Quốc</div>
    
    <p class="info">Thử nghiệm cài đặt PWA trên iPhone bằng cách bấm nút Share và chọn "Thêm vào MH chính".</p>
  </div>

  <script>
    // Kích hoạt Service Worker để cấu hình PWA chạy offline
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
</body>
</html>
